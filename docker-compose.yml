version: '3.8'

services:
  oracle-db:
    image: gvenzl/oracle-free:latest
    container_name: employee-oracle
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=password
      - APP_USER=invex_user
      - APP_USER_PASSWORD=invex_password
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5

  employee-service:
    build: .
    container_name: employee-service
    ports:
      - "8080:8080"
    depends_on:
      oracle-db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@oracle-db:1521/FREEPDB1
      - SPRING_DATASOURCE_DRIVER=oracle.jdbc.OracleDriver
      - SPRING_DATASOURCE_USERNAME=invex_user
      - SPRING_DATASOURCE_PASSWORD=invex_password
      - SPRING_JPA_DDL_AUTO=update
      - SPRING_JPA_DIALECT=org.hibernate.dialect.Oracle12cDialect
